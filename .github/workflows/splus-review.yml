name: Splus self-review

# Splus reviews its own pull requests — the ultimate dogfood.
# Advisory by design: this never blocks the PR (the CI workflow is the gate).
# It runs the deterministic engine → learned suppression → (optional) LLM triage
# on the PR diff, writes the review to the Actions summary, and posts inline
# annotations on the changed lines. The deterministic path needs no secrets.

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: splus-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Splus reviews this PR (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need base..head history for the diff
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build the engine
        run: cargo build --release --locked
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @splus/shared --filter @splus/suppression --filter @splus/triage --filter @splus/cli build

      - name: SCIP index (precise blast-radius tier · best-effort)
        continue-on-error: true
        run: node packages/cli/dist/index.js index

      - name: Splus review
        env:
          SPLUS_ENGINE: ${{ github.workspace }}/target/release/splus-engine
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          CLI="node packages/cli/dist/index.js"
          FLAGS=""
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            FLAGS="--llm"
            echo "LLM triage: ON"
          else
            echo "LLM triage: off (add an ANTHROPIC_API_KEY secret to enable)"
          fi

          # Human-readable review → the Actions run summary.
          {
            echo "## 🔬 Splus reviewed this PR"
            echo "_deterministic engine → learned suppression${ANTHROPIC_API_KEY:+ → LLM triage} · diff-scoped, clean-as-you-code_"
            echo ""
            echo '```'
            $CLI review --root . --base "$BASE_SHA" $FLAGS --no-color
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Inline annotations on the diff, from the deterministic (suppression-
          # applied) report — works on any repo, no code-scanning required.
          $CLI review --root . --base "$BASE_SHA" --json > splus.json 2>/dev/null
          node scripts/gh-annotate.mjs < splus.json

          exit 0 # advisory: never fail the PR
