name: Splus self-review

# Splus reviews its own pull requests — the ultimate dogfood.
# Advisory by design: this never blocks the PR (the CI workflow is the gate).
# It runs the deterministic engine on the PR diff, writes the review to the
# Actions summary, and posts inline annotations on the changed lines. Fully
# deterministic — no secrets, no network. (Learned suppression and the optional
# LLM judgment live in the agent/MCP flow, not in this CI dogfood.)

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: splus-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Splus reviews this PR (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need base..head history for the diff
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build the engine
        run: cargo build --release --locked
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Splus review
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          ENGINE="$PWD/target/release/splus-engine"

          # Human-readable review → the Actions run summary.
          {
            echo "## 🔬 Splus reviewed this PR"
            echo "_deterministic engine · diff-scoped, clean-as-you-code_"
            echo ""
            echo '```'
            "$ENGINE" review --root . --base "$BASE_SHA" --format pretty --no-color
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Inline annotations on the diff, from the deterministic report —
          # works on any repo, no code-scanning required.
          "$ENGINE" review --root . --base "$BASE_SHA" --format json > splus.json 2>/dev/null
          node scripts/gh-annotate.mjs < splus.json

          exit 0 # advisory: never fail the PR
