  </text>

  <!-- footer -->
  <text x="84" y="582" font-size="21" fill="#f7f5ef" fill-opacity="0.5">splus.sh</text>
  <text x="1116" y="582" font-size="21" fill="#f7f5ef" fill-opacity="0.5" text-anchor="end">open source · runs on your machine</text>
