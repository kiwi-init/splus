# GitHub App manifest for Splus. Least-privilege: read code, write reviews +
# checks, read PR conversations for @mentions.
name: Splus
description: Precision-first code review. Deterministic, diff-scoped, low-noise.
url: https://github.com/ojowwalker77/Splus
public: false

default_permissions:
  # Read repository code to clone head and analyze the diff.
  contents: read
  # Post the batched PR review + inline comments + suggestions.
  pull_requests: write
  # Set the non-blocking Splus check.
  checks: write
  # Read issue/PR comments to detect @splus mentions.
  issues: write
  metadata: read

default_events:
  - pull_request
  - issue_comment
  - pull_request_review_comment
